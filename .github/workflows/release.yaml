name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TZ: "Asia/Tokyo"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve CalVer tag
        id: ver
        run: |
          base=$(date +'%Y.%m.%d')
          tag=$base
          n=1
          while gh api "repos/${{ github.repository }}/git/ref/tags/$tag" >/dev/null 2>&1; do
            tag="$base.$n"
            n=$((n + 1))
          done
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Build MCP binaries
        run: |
          ver="${{ steps.ver.outputs.tag }}"
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            os="${target%/*}"; arch="${target#*/}"
            ext=""; [ "$os" = "windows" ] && ext=".exe"
            GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 \
              go build -trimpath -o "dist/tsugu-mcp_${ver}_${os}_${arch}${ext}" ./cmd/tsugu-mcp
          done
          ls -la dist

      - name: Create release
        run: |
          gh release create "${{ steps.ver.outputs.tag }}" \
            --target "${{ github.sha }}" \
            --title "${{ steps.ver.outputs.tag }}" \
            --generate-notes \
            dist/*
